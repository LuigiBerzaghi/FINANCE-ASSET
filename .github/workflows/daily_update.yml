name: Daily Price Update

on:
  schedule:
    # 21:00 UTC = 18:00 BRT, Monday-Friday
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Run daily batch on deployed app
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          BATCH_TOKEN: ${{ secrets.BATCH_TOKEN }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "Set the APP_BASE_URL repository variable to your deployed app URL."
            exit 1
          fi

          APP_BASE_URL="${APP_BASE_URL%/}"
          if [ -n "$BATCH_TOKEN" ]; then
            curl --fail --show-error --silent -X POST "$APP_BASE_URL/api/batch/run" -H "X-Batch-Token: $BATCH_TOKEN"
          else
            curl --fail --show-error --silent -X POST "$APP_BASE_URL/api/batch/run"
          fi
